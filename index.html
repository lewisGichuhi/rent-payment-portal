<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rent Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Three.js for ColorBends background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            position: relative;
        }

        /* ColorBends Background Container */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0f172a;
        }

        #bg-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* Scrollable Container */
        .scroll-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px 16px 30px;
        }

        .scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .dashboard-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        
        .stats-bar {
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }
        .stat-item { flex: 1 1 50%; text-align: center; }
        .stat-item .label { font-size: 0.65em; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-item .stat-val { font-size: 1.2em; font-weight: bold; color: #38bdf8; }

        .panel {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }
        
        .border-paid { border-color: rgba(16, 185, 129, 0.3); color: #10b981; }
        .border-owing { border-color: rgba(239, 68, 68, 0.3); color: #ef4444; animation: glow 1.5s infinite; }
        
        @keyframes glow { 
            0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); } 
            50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); } 
            100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); } 
        }

        .profile-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }
        .label { font-size: 0.7em; color: #94a3b8; display: block; margin-top: 8px; }
        
        input {
            width: 100%;
            padding: 8px 10px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        input.pin-input { color: #fbbf24; font-weight: bold; letter-spacing: 2px; border-color: rgba(251, 191, 36, 0.3); }
        
        button {
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
            transition: all 0.3s;
            background: linear-gradient(135deg, #4f46e5, #3730a3);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35); }
        button:active { transform: translateY(0); }

        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.25); }
        .btn-danger:hover { box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25); }
        .btn-success:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35); }
        .btn-secondary { background: rgba(255,255,255,0.05); box-shadow: none; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); box-shadow: none; }

        .contact-row { display: flex; gap: 6px; margin-top: 8px; }
        .contact-row a { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 0.75em; transition: all 0.3s; }
        .call-btn { background: #0284c7; color: white; }
        .call-btn:hover { background: #0369a1; }
        .whatsapp-btn { background: #25D366; color: #06210f; }
        .whatsapp-btn:hover { background: #1da851; }
        .no-phone { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 0.75em; background: rgba(51, 65, 85, 0.5); color: #94a3b8; }

        .payment-log { max-height: 120px; overflow-y: auto; margin-top: 6px; background: rgba(15, 23, 42, 0.3); border-radius: 8px; padding: 6px; }
        .payment-log::-webkit-scrollbar { width: 3px; }
        .payment-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .payment-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            padding: 4px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #cbd5e1;
            align-items: center;
        }
        .payment-row:last-child { border-bottom: none; }
        .payment-row .delete-btn { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.7em; }
        .payment-row .delete-btn:hover { background: #dc2626; }
        .payment-row .date { flex: 2; }
        .payment-row .amount { flex: 1; text-align: right; margin-right: 6px; }
        .payment-row .actions { flex: 0 0 auto; }
        .payment-row .no-payments { color: #64748b; text-align: center; width: 100%; }

        .add-payment-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .add-payment-row input { flex: 1; min-width: 80px; }
        .add-payment-row button { width: auto; padding: 8px 14px; margin-top: 0; }

        .access-note { color: #94a3b8; font-size: 0.8em; line-height: 1.4; margin: 6px 0 0; }
        .login-error { color: #ef4444; font-size: 0.8em; margin-top: 6px; text-align: center; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .update-pin-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
        .update-pin-section input { max-width: 200px; }
        .update-pin-section button { max-width: 200px; background: linear-gradient(135deg, #10b981, #059669); }

        /* Auth Screen */
        #authScreen {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        #authScreen h2 {
            font-size: 20px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #authScreen .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
        }

        @media (max-width: 600px) {
            .scroll-container { padding: 12px 12px 20px; }
            .panel { padding: 14px 12px; }
            .stats-bar { padding: 10px 12px; }
            .stat-item .stat-val { font-size: 1em; }
            .update-pin-section input { max-width: 100%; }
            .update-pin-section button { max-width: 100%; }
            .add-payment-row input { flex: 1 1 100%; }
            .add-payment-row button { width: 100%; }
            .profile-img { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

<!-- ColorBends Background -->
<div id="bg-container"></div>

<script>
// ============================================================
// COLORBENDS BACKGROUND - Three.js Implementation
// ============================================================
(function() {
    const container = document.getElementById('bg-container');
    
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    
    const renderer = new THREE.WebGLRenderer({
        antialias: false,
        powerPreference: 'high-performance',
        alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0x0f172a, 1);
    renderer.domElement.style.width = '100%';
    renderer.domElement.style.height = '100%';
    renderer.domElement.style.display = 'block';
    container.appendChild(renderer.domElement);
    
    function resize() {
        const w = container.clientWidth || window.innerWidth;
        const h = container.clientHeight || window.innerHeight;
        renderer.setSize(w, h, false);
    }
    resize();
    window.addEventListener('resize', resize);
    
    const MAX_COLORS = 8;
    
    const vertexShader = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `;
    
    const fragmentShader = `
        #define MAX_COLORS ${MAX_COLORS}
        uniform vec2 uCanvas;
        uniform float uTime;
        uniform float uSpeed;
        uniform vec2 uRot;
        uniform int uColorCount;
        uniform vec3 uColors[MAX_COLORS];
        uniform float uScale;
        uniform float uFrequency;
        uniform float uWarpStrength;
        uniform vec2 uPointer;
        uniform float uMouseInfluence;
        uniform float uParallax;
        uniform float uNoise;
        uniform int uIterations;
        uniform float uIntensity;
        uniform float uBandWidth;
        varying vec2 vUv;

        void main() {
            float t = uTime * uSpeed;
            vec2 p = vUv * 2.0 - 1.0;
            p += uPointer * uParallax * 0.1;
            vec2 rp = vec2(p.x * uRot.x - p.y * uRot.y, p.x * uRot.y + p.y * uRot.x);
            vec2 q = vec2(rp.x * (uCanvas.x / uCanvas.y), rp.y);
            q /= max(uScale, 0.0001);
            q /= 0.5 + 0.2 * dot(q, q);
            q += 0.2 * cos(t) - 7.56;
            vec2 toward = (uPointer - rp);
            q += toward * uMouseInfluence * 0.2;

            for (int j = 0; j < 5; j++) {
                if (j >= uIterations - 1) break;
                vec2 rr = sin(1.5 * (q.yx * uFrequency) + 2.0 * cos(q * uFrequency));
                q += (rr - q) * 0.15;
            }

            vec3 col = vec3(0.0);
            float a = 1.0;

            if (uColorCount > 0) {
                vec2 s = q;
                vec3 sumCol = vec3(0.0);
                float cover = 0.0;
                for (int i = 0; i < MAX_COLORS; ++i) {
                    if (i >= uColorCount) break;
                    s -= 0.01;
                    vec2 r = sin(1.5 * (s.yx * uFrequency) + 2.0 * cos(s * uFrequency));
                    float m0 = length(r + sin(5.0 * r.y * uFrequency - 3.0 * t + float(i)) / 4.0);
                    float kBelow = clamp(uWarpStrength, 0.0, 1.0);
                    float kMix = pow(kBelow, 0.3);
                    float gain = 1.0 + max(uWarpStrength - 1.0, 0.0);
                    vec2 disp = (r - s) * kBelow;
                    vec2 warped = s + disp * gain;
                    float m1 = length(warped + sin(5.0 * warped.y * uFrequency - 3.0 * t + float(i)) / 4.0);
                    float m = mix(m0, m1, kMix);
                    float w = 1.0 - exp(-uBandWidth / exp(uBandWidth * m));
                    sumCol += uColors[i] * w;
                    cover = max(cover, w);
                }
                col = clamp(sumCol, 0.0, 1.0);
            } else {
                vec2 s = q;
                for (int k = 0; k < 3; ++k) {
                    s -= 0.01;
                    vec2 r = sin(1.5 * (s.yx * uFrequency) + 2.0 * cos(s * uFrequency));
                    float m0 = length(r + sin(5.0 * r.y * uFrequency - 3.0 * t + float(k)) / 4.0);
                    float kBelow = clamp(uWarpStrength, 0.0, 1.0);
                    float kMix = pow(kBelow, 0.3);
                    float gain = 1.0 + max(uWarpStrength - 1.0, 0.0);
                    vec2 disp = (r - s) * kBelow;
                    vec2 warped = s + disp * gain;
                    float m1 = length(warped + sin(5.0 * warped.y * uFrequency - 3.0 * t + float(k)) / 4.0);
                    float m = mix(m0, m1, kMix);
                    col[k] = 1.0 - exp(-uBandWidth / exp(uBandWidth * m));
                }
            }

            col *= uIntensity;

            if (uNoise > 0.0001) {
                float n = fract(sin(dot(gl_FragCoord.xy + vec2(uTime), vec2(12.9898, 78.233))) * 43758.5453123);
                col += (n - 0.5) * uNoise;
                col = clamp(col, 0.0, 1.0);
            }

            gl_FragColor = vec4(col, 1.0);
        }
    `;
    
    const colors = [
        new THREE.Color(0x8a5cff),
        new THREE.Color(0x6366f1),
        new THREE.Color(0x3b82f6),
        new THREE.Color(0x06b6d4),
        new THREE.Color(0x10b981),
        new THREE.Color(0xf59e0b),
        new THREE.Color(0xf472b6)
    ];
    
    const colorVecs = colors.map(c => c.clone());
    while (colorVecs.length < MAX_COLORS) {
        colorVecs.push(new THREE.Color(0, 0, 0));
    }
    const colorArray = colorVecs.map(c => new THREE.Vector3(c.r, c.g, c.b));
    
    const uniforms = {
        uCanvas: { value: new THREE.Vector2(1, 1) },
        uTime: { value: 0 },
        uSpeed: { value: 0.15 },
        uRot: { value: new THREE.Vector2(1, 0) },
        uColorCount: { value: colors.length },
        uColors: { value: colorArray },
        uScale: { value: 1.0 },
        uFrequency: { value: 1.2 },
        uWarpStrength: { value: 1.0 },
        uPointer: { value: new THREE.Vector2(0, 0) },
        uMouseInfluence: { value: 1.0 },
        uParallax: { value: 0.5 },
        uNoise: { value: 0.05 },
        uIterations: { value: 2 },
        uIntensity: { value: 1.5 },
        uBandWidth: { value: 8.0 }
    };
    
    const material = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: uniforms,
        transparent: false
    });
    
    const geometry = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    
    const pointerTarget = new THREE.Vector2(0, 0);
    const pointerCurrent = new THREE.Vector2(0, 0);
    let pointerSmooth = 8;
    
    container.addEventListener('pointermove', function(e) {
        const rect = container.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / (rect.width || 1)) * 2 - 1;
        const y = -(((e.clientY - rect.top) / (rect.height || 1)) * 2 - 1);
        pointerTarget.set(x, y);
    });
    
    container.addEventListener('touchmove', function(e) {
        const touch = e.touches[0];
        if (touch) {
            const rect = container.getBoundingClientRect();
            const x = ((touch.clientX - rect.left) / (rect.width || 1)) * 2 - 1;
            const y = -(((touch.clientY - rect.top) / (rect.height || 1)) * 2 - 1);
            pointerTarget.set(x, y);
        }
    }, { passive: true });
    
    const clock = new THREE.Clock();
    let rotationAngle = 0;
    const rotationSpeed = 0.03;
    
    function animate() {
        const dt = clock.getDelta();
        const elapsed = clock.getElapsedTime();
        
        uniforms.uTime.value = elapsed;
        rotationAngle += rotationSpeed * dt;
        const rad = rotationAngle;
        uniforms.uRot.value.set(Math.cos(rad), Math.sin(rad));
        
        const cur = pointerCurrent;
        const tgt = pointerTarget;
        const amt = Math.min(1, dt * pointerSmooth);
        cur.lerp(tgt, amt);
        uniforms.uPointer.value.copy(cur);
        
        const w = container.clientWidth || window.innerWidth;
        const h = container.clientHeight || window.innerHeight;
        uniforms.uCanvas.value.set(w, h);
        
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    animate();
    
    window.addEventListener('resize', function() {
        const w = container.clientWidth || window.innerWidth;
        const h = container.clientHeight || window.innerHeight;
        renderer.setSize(w, h, false);
        uniforms.uCanvas.value.set(w, h);
    });
    
    window.addEventListener('beforeunload', function() {
        geometry.dispose();
        material.dispose();
        renderer.dispose();
        renderer.forceContextLoss();
        if (renderer.domElement && renderer.domElement.parentElement === container) {
            container.removeChild(renderer.domElement);
        }
    });
})();
</script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbkC9jWHaE7ztEqMer5XmB_nOEb35UtAI",
        authDomain: "rent-collection-1b773.firebaseapp.com",
        databaseURL: "https://rent-collection-1b773-default-rtdb.firebaseio.com",
        projectId: "rent-collection-1b773",
        storageBucket: "rent-collection-1b773.firebasestorage.app",
        messagingSenderId: "1045895163870",
        appId: "1:1045895163870:web:0e08ce6efef3b17fceb74f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    // MASTER PIN - STORED IN FIREBASE
    // ============================================================
    const MASTER_PIN_PATH = 'system_config/admin_pin';
    const DEFAULT_PIN = '126483';

    function getStoredMasterPin() {
        return new Promise((resolve) => {
            db.ref(MASTER_PIN_PATH).once('value', (snapshot) => {
                const pin = snapshot.val();
                if (pin) {
                    resolve(pin);
                } else {
                    db.ref(MASTER_PIN_PATH).set(DEFAULT_PIN);
                    resolve(DEFAULT_PIN);
                }
            }).catch(() => {
                resolve(DEFAULT_PIN);
            });
        });
    }

    // ============================================================
    // LOGIN
    // ============================================================
    async function checkMasterPin() {
        const enteredPin = document.getElementById('masterPin').value.trim();
        const errorEl = document.getElementById('loginError');
        const loadingEl = document.getElementById('loginLoading');
        
        errorEl.textContent = '';
        loadingEl.style.display = 'block';
        
        if (!enteredPin) {
            errorEl.textContent = 'Please enter your PIN.';
            loadingEl.style.display = 'none';
            return;
        }

        try {
            const storedPin = await getStoredMasterPin();
            loadingEl.style.display = 'none';
            
            if (enteredPin === storedPin) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                errorEl.textContent = 'Invalid PIN. Please try again.';
                document.getElementById('masterPin').value = '';
                document.getElementById('masterPin').focus();
            }
        } catch (error) {
            loadingEl.style.display = 'none';
            errorEl.textContent = 'Error verifying PIN. Please try again.';
            console.error('Login error:', error);
        }
    }

    // ============================================================
    // UPDATE MASTER PIN
    // ============================================================
    async function updateMasterPin() {
        const newPin = document.getElementById('newMasterPin').value.trim();
        const statusEl = document.getElementById('pinUpdateStatus');
        
        if (!newPin) {
            statusEl.textContent = '⚠️ Please enter a new PIN.';
            statusEl.style.color = '#ef4444';
            return;
        }
        if (!/^\d{4,6}$/.test(newPin)) {
            statusEl.textContent = '⚠️ PIN must be 4-6 digits.';
            statusEl.style.color = '#ef4444';
            return;
        }

        try {
            await db.ref(MASTER_PIN_PATH).set(newPin);
            statusEl.textContent = '✅ Admin PIN updated successfully!';
            statusEl.style.color = '#10b981';
            document.getElementById('newMasterPin').value = '';
        } catch (error) {
            statusEl.textContent = '❌ Error updating PIN. Please try again.';
            statusEl.style.color = '#ef4444';
            console.error('Update PIN error:', error);
        }
    }

    // ============================================================
    // LOAD DATA
    // ============================================================
    function loadData() {
        db.ref("tenant_ledger").on("value", (snap) => {
            const ledger = snap.val() || {};
            const grid = document.getElementById("ledgerGrid");
            grid.innerHTML = "";
            let gOwed = 0, gPaid = 0;

            Object.keys(ledger).sort().forEach(id => {
                const t = ledger[id];
                const last = Number(t.lastMonth || 0);
                const cur = Number(t.current || 0);

                const paymentsObj = t.payments || {};
                const paymentEntries = Object.keys(paymentsObj).map(pid => ({ pid, ...paymentsObj[pid] }));
                paymentEntries.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
                const totalPaid = paymentEntries.reduce((sum, p) => sum + Number(p.amount || 0), 0);

                const bal = (last + cur) - totalPaid;
                gOwed += bal; gPaid += totalPaid;
                const pin = t.pin !== undefined && t.pin !== null ? t.pin : "";
                const phone = t.phone ? String(t.phone).trim() : "";

                let paymentRowsHtml = '';
                if (paymentEntries.length) {
                    paymentRowsHtml = paymentEntries.map(p => `
                        <div class="payment-row">
                            <span class="date">${p.date || '--'}</span>
                            <span class="amount">Ksh ${Number(p.amount || 0).toLocaleString()}</span>
                            <span class="actions">
                                <button class="delete-btn" onclick="deletePayment('${id}', '${p.pid}')" title="Delete this payment entry">✕</button>
                            </span>
                        </div>
                    `).join("");
                } else {
                    paymentRowsHtml = `<div class="payment-row"><span class="no-payments">No payments logged yet</span></div>`;
                }

                const todayStr = new Date().toISOString().slice(0, 10);

                let contactHtml;
                if (phone) {
                    const waNumber = phone.replace(/[^\d]/g, "");
                    const waMessage = encodeURIComponent(`Hello ${t.name || 'there'}, this is regarding your rent for House ${id}. Current balance: Ksh ${bal.toLocaleString()}. Kindly confirm your payment status.`);
                    contactHtml = `
                        <div class="contact-row">
                            <a class="call-btn" href="tel:${phone}">📞 Call</a>
                            <a class="whatsapp-btn" href="https://wa.me/${waNumber}?text=${waMessage}" target="_blank" rel="noopener">💬 WhatsApp</a>
                        </div>`;
                } else {
                    contactHtml = `<div class="contact-row"><span class="no-phone">No phone number on file</span></div>`;
                }
                
                grid.innerHTML += `
                    <div class="panel ${bal > 0 ? 'border-owing' : 'border-paid'}">
                        ${t.imgUrl ? `<img src="${t.imgUrl}" class="profile-img">` : ''}
                        <h3 style="font-size: 16px;">${t.name}</h3>
                        <div style="font-size: 1.2em; font-weight:900;">Bal: ${bal}</div>
                        <span class="label">Last Month Bal:</span><input type="number" value="${last}" onblur="update('${id}','lastMonth',this.value)">
                        <span class="label">Current Rent:</span><input type="number" value="${cur}" onblur="update('${id}','current',this.value)">
                        <span class="label">Login PIN:</span><input type="text" class="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="6" value="${pin}" onblur="updatePin('${id}',this.value)">
                        <span class="label">Phone Number:</span><input type="tel" value="${phone}" placeholder="e.g. 2547XXXXXXXX" onblur="updatePhone('${id}',this.value)">

                        <span class="label">Payment History (Total: Ksh ${totalPaid.toLocaleString()}):</span>
                        <div class="payment-log">${paymentRowsHtml}</div>
                        <div class="add-payment-row">
                            <input type="date" id="pdate-${id}" value="${todayStr}">
                            <input type="number" id="pamt-${id}" placeholder="Amount">
                            <button class="btn-success" onclick="addPayment('${id}')">Add</button>
                        </div>

                        ${contactHtml}
                        <button class="btn-secondary" onclick="override('${id}')">Manual Override</button>
                    </div>`;
            });
            document.getElementById("totalOwed").innerText = gOwed;
            document.getElementById("totalPaid").innerText = gPaid;
        });
    }

    // ============================================================
    // DELETE PAYMENT
    // ============================================================
    window.deletePayment = (tenantId, paymentId) => {
        if (!confirm("Are you sure you want to delete this payment entry? This action cannot be undone.")) {
            return;
        }
        db.ref(`tenant_ledger/${tenantId}/payments/${paymentId}`).remove()
            .then(() => {
                console.log(`✅ Payment ${paymentId} deleted for tenant ${tenantId}`);
            })
            .catch((err) => {
                console.error("Error deleting payment:", err);
                alert("Failed to delete payment. Please try again.");
            });
    };

    // ============================================================
    // ROLLOVER MONTH
    // ============================================================
    window.rolloverMonth = () => {
        if(!confirm("Are you sure? This will reset the month for everyone.")) return;
        db.ref("tenant_ledger").once("value", (snap) => {
            const updates = {};
            snap.forEach(c => {
                const t = c.val();
                const paymentsObj = t.payments || {};
                const totalPaid = Object.values(paymentsObj).reduce((sum, p) => sum + Number(p.amount || 0), 0);
                const newLast = (Number(t.lastMonth || 0) + Number(t.current || 0)) - totalPaid;
                updates[`${c.key}/lastMonth`] = newLast;
                updates[`${c.key}/current`] = 3000;
                updates[`${c.key}/payments`] = null;
            });
            db.ref("tenant_ledger").update(updates);
        });
    };

    // ============================================================
    // UPDATE FUNCTIONS
    // ============================================================
    window.update = (id, key, val) => db.ref(`tenant_ledger/${id}/${key}`).set(Number(val));

    window.updatePin = (id, val) => {
        const cleaned = String(val).trim();
        if (!/^\d{4,6}$/.test(cleaned)) {
            alert("PIN must be 4-6 digits. Change not saved.");
            loadData();
            return;
        }
        db.ref(`tenant_ledger/${id}/pin`).set(cleaned);
    };

    window.updatePhone = (id, val) => {
        const cleaned = String(val).trim();
        db.ref(`tenant_ledger/${id}/phone`).set(cleaned);
    };

    // ============================================================
    // ADD PAYMENT
    // ============================================================
    window.addPayment = (id) => {
        const dateVal = document.getElementById(`pdate-${id}`).value;
        const amtVal = document.getElementById(`pamt-${id}`).value;
        const amt = Number(amtVal);

        if (!dateVal) { alert("Please pick a date."); return; }
        if (!amtVal || isNaN(amt) || amt <= 0) { alert("Please enter a valid payment amount."); return; }

        db.ref(`tenant_ledger/${id}/payments`).push({ date: dateVal, amount: amt })
            .then(() => { document.getElementById(`pamt-${id}`).value = ""; })
            .catch(() => alert("Could not save payment. Check your connection."));
    };

    // ============================================================
    // MANUAL OVERRIDE
    // ============================================================
    window.override = (id) => {
        if(prompt("Enter Override PIN:") === "4348") {
            const newBal = prompt("Enter new Last Month Balance:");
            db.ref(`tenant_ledger/${id}/lastMonth`).set(Number(newBal));
            db.ref(`tenant_ledger/${id}/current`).set(0);
            db.ref(`tenant_ledger/${id}/payments`).set(null);
        } else alert("Wrong PIN");
    };

    // ============================================================
    // ENTER KEY SUPPORT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('masterPin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkMasterPin();
            }
        });
        
        document.getElementById('newMasterPin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                updateMasterPin();
            }
        });
    });
</script>
</body>
</html>
